<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Billing System</title>

    <link rel="stylesheet" href="/static/plugins/adminlte/plugins/fontawesome-free/css/all.min.css">

    <link rel="stylesheet" href="/static/plugins/adminlte/dist/css/adminlte.min.css">
</head>

<body class="hold-transition sidebar-mini layout-fixed">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <span class="navbar-brand">Smart Billing</span>

        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a href="/" class="nav-link">Logout</a>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">

        <a href="#" class="brand-link">
            <span class="brand-text font-weight-light">Smart System</span>
        </a>

        <div class="sidebar">
            <nav class="mt-2">

                <ul class="nav nav-pills nav-sidebar flex-column">

                    {% if session.get("role") == "admin" %}

                    <li class="nav-item">
                        <a href="{{ url_for('admin.dashboard') }}"
                           class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
                            <i class="nav-icon fas fa-tachometer-alt"></i>
                            <p>Dashboard</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="{{ url_for('admin.users') }}"
                           class="nav-link {% if request.path == '/users' %}active{% endif %}">
                            <i class="nav-icon fas fa-users"></i>
                            <p>Users</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="{{ url_for('admin.billing') }}"
                           class="nav-link {% if request.path == '/billing' %}active{% endif %}">
                            <i class="nav-icon fas fa-file-invoice"></i>
                            <p>Billing</p>
                        </a>
                    </li>

                    {% endif %}

                    {% if session.get("role") == "user" %}

                    <li class="nav-item">
                        <a href="{{ url_for('admin.user_dashboard') }}"
                           class="nav-link {% if request.path == '/user_dashboard' %}active{% endif %}">
                            <i class="nav-icon fas fa-home"></i>
                            <p>Dashboard</p>
                        </a>
                    </li>

                    {% endif %}

                </ul>

            </nav>
        </div>

    </aside>

    <div class="content-wrapper">
        <section class="content pt-3">
            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>

</div>

<!-- JS -->
<script src="/static/plugins/adminlte/plugins/jquery/jquery.min.js"></script>
<script src="/static/plugins/adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/static/plugins/adminlte/dist/js/adminlte.min.js"></script>

</body>
</html>
